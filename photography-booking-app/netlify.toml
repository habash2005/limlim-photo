[build]
  command = "npm run build"
  publish = "dist"

  [build.environment]
    NODE_VERSION = "18"
    # EITHER allow-list the specific Firebase key:
    # SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = '["AIzaSyXXXX...YOUR_KEY_HERE..."]'
    # OR disable the scanner for this site:
    # SECRETS_SCAN_SMART_DETECTION_ENABLED = "false"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["cloudinary"]

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
