[build]
  command = "npm run build"
  publish = "dist"
  # If your project lives in a subfolder, set base; otherwise remove this line:
  # base = "photography-booking-app"

  # ✅ Tell Netlify to use Node 18 during builds & functions
  [build.environment]
    NODE_VERSION = "18"

# Bundle functions with esbuild and include the Cloudinary SDK
[functions]
  node_bundler = "esbuild"
  external_node_modules = ["cloudinary"]

# SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# (Optional) If you rely on /api/* → functions:
# [[redirects]]
#   from = "/api/*"
#   to = "/.netlify/functions/:splat"
#   status = 200
