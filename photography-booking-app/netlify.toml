[build]
  command = "npm run build"
  publish = "dist"
  base = "photography-booking-app"

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["cloudinary"]
  node_js_version = "18"

# SPA routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Functions proxy (you likely already have this)
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
