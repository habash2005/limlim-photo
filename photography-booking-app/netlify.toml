[build]
  command = "npm ci && npm run build"
  publish = "dist"

# Netlify Image CDN — allow on-the-fly resizing of images served from
# Firebase Storage (8MB raw JPEGs → ~80KB resized variants on demand).
# Used by `cdnUrl()` in src/lib/imageUrl.js.
[images]
  remote_images = [
    "https://firebasestorage.googleapis.com/.*",
    "https://res.cloudinary.com/.*"
  ]

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA fallback (safe to keep; required if you switch off hash routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Friendly alias to call your functions from the app
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

# Optional: pin Node (match your local)
[build.environment]
  NODE_VERSION = "20"
  # Prefer this over disabling scanning:
  # SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIza...yourFirebaseKey..."
